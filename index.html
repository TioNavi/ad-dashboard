<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AD/DNS — Tablero de Proyecto</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #070B14; --bg2: #0C1220; --bg3: #111827;
    --border: #1B2537; --border2: #243044;
    --text: #DDE3EE; --muted: #4B5A72; --muted2: #8898AA;
    --accent: #00D4AA;
    --c1:#00D4AA; --c2:#F05252; --c3:#F59E0B;
    --c4:#818CF8; --c5:#38BDF8; --c6:#FB923C; --c7:#4ADE80;
    --font-mono:'JetBrains Mono',monospace;
    --font-display:'Syne',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:15px;line-height:1.6;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,170,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

  /* HEADER */
  .header{position:sticky;top:0;z-index:200;background:rgba(7,11,20,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:20px 32px 16px;}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;margin-bottom:16px;}
  .project-label{font-size:11px;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-bottom:4px;}
  .project-title{font-family:var(--font-display);font-size:22px;font-weight:800;color:#F1F5F9;letter-spacing:-.5px;}
  .project-dates{font-size:12px;color:var(--muted);margin-top:3px;}
  .kpis{display:flex;gap:10px;flex-wrap:wrap;}
  .kpi{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 18px;text-align:center;min-width:90px;}
  .kpi-val{font-size:22px;font-weight:700;font-family:var(--font-display);}
  .kpi-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}
  .bar-header{display:flex;justify-content:space-between;margin-bottom:5px;}
  .bar-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;}
  .bar-pct{font-size:12px;color:var(--accent);}
  .bar-track{background:var(--border);border-radius:4px;height:8px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--c1),var(--c5));transition:width .5s cubic-bezier(.4,0,.2,1);}

  /* TOOLBAR */
  .toolbar{display:flex;gap:8px;align-items:center;padding:12px 32px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap;position:relative;z-index:100;}
  .toolbar-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-right:4px;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;cursor:pointer;font-family:var(--font-mono);font-size:13px;font-weight:600;border:1px solid;transition:all .15s;user-select:none;}
  .btn-collapse{color:var(--muted2);border-color:var(--border2);background:transparent;}
  .btn-collapse:hover{background:var(--border);}
  .btn-reset{color:var(--muted2);border-color:var(--border2);background:transparent;}
  .btn-reset:hover{color:var(--c2);border-color:var(--c2);background:rgba(240,82,82,.08);}

  /* SYNC STATUS */
  .sync-status{margin-left:auto;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .sync-dot.connected{background:var(--c7);animation:pulse 2.5s infinite;}
  .sync-dot.syncing{background:var(--c3);animation:pulse .6s infinite;}
  .sync-dot.offline{background:var(--c2);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* WHO IS EDITING */
  .online-users{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);}
  .user-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:2px 10px;font-size:10px;color:var(--muted2);}

  /* MAIN */
  .main{max-width:1100px;margin:0 auto;padding:24px 32px;position:relative;z-index:1;}

  /* PHASE CARD */
  .phase-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden;transition:border-color .2s;}
  .phase-card.open{border-color:var(--phase-color,var(--border));}
  .phase-header{display:flex;align-items:center;gap:14px;padding:15px 18px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;transition:background .15s,border-color .15s;}
  .phase-card.open .phase-header{background:#0A101D;border-color:var(--border);}
  .phase-header:hover{background:#0A101D;}
  .phase-stripe{width:4px;height:38px;border-radius:3px;flex-shrink:0;}
  .phase-meta{flex:1;}
  .phase-name-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .phase-name{font-size:15px;font-weight:700;color:#F1F5F9;font-family:var(--font-display);}
  .tag{font-size:11px;color:var(--muted);background:var(--bg3);border-radius:4px;padding:3px 8px;letter-spacing:.3px;}
  .phase-progress-row{display:flex;align-items:center;gap:10px;}
  .phase-bar{flex:1;background:var(--border);border-radius:3px;height:5px;overflow:hidden;}
  .phase-bar-fill{height:100%;border-radius:3px;transition:width .4s;}
  .phase-pct{font-size:13px;font-weight:700;min-width:40px;}
  .phase-tasks-count{font-size:12px;color:var(--muted);}
  .chevron{color:var(--muted);font-size:16px;transition:transform .2s;}
  .phase-card.open .chevron{transform:rotate(90deg);}

  /* TASKS */
  .tasks-wrap{padding:12px 18px 18px;}
  .task-row{display:flex;gap:12px;align-items:flex-start;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--border);transition:border-left-color .2s;}
  .task-row.deliverable{border-left-color:var(--phase-color,var(--accent));}
  .status-btn{flex-shrink:0;padding:6px 12px;border-radius:6px;font-family:var(--font-mono);font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;margin-top:2px;white-space:nowrap;}
  .task-body{flex:1;min-width:0;}
  .task-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
  .task-name{font-size:14px;color:#CBD5E1;line-height:1.5;}
  .task-name.deliverable{color:var(--phase-color,var(--accent));font-weight:700;}
  .task-dates{display:flex;gap:6px;flex-shrink:0;}
  .slider-row{display:flex;align-items:center;gap:10px;}
  input[type=range]{flex:1;height:6px;cursor:pointer;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:4px;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--thumb-color,var(--accent));border:2px solid var(--bg);cursor:pointer;box-shadow:0 0 8px var(--thumb-color,var(--accent));}
  .slider-pct{font-size:14px;font-weight:700;min-width:44px;text-align:right;}
  .note-btn{background:var(--bg2);border:1px solid var(--border2);border-radius:5px;color:var(--muted2);font-family:var(--font-mono);font-size:12px;padding:5px 11px;cursor:pointer;transition:all .15s;}
  .note-btn.has-note{color:var(--c5);border-color:var(--c5);background:rgba(56,189,248,.08);}
  .task-note{margin-top:8px;font-size:13px;color:#94A3B8;background:var(--bg);border-left:2px solid var(--c5);border-radius:0 5px 5px 0;padding:8px 12px;line-height:1.6;}
  .task-updated{font-size:11px;color:var(--muted);margin-top:4px;}

  /* SUMMARY */
  .summary-section{margin-top:8px;}
  .section-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:3px;margin-bottom:14px;}
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:10px;}
  .summary-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 12px;border-top:2px solid var(--phase-color,var(--accent));cursor:pointer;transition:border-color .15s,background .15s;}
  .summary-card:hover{background:var(--bg3);}
  .summary-pct{font-size:24px;font-weight:800;font-family:var(--font-display);}
  .summary-name{font-size:12px;color:var(--muted2);margin-top:4px;line-height:1.3;}
  .summary-mini-bar{margin-top:8px;background:var(--border);border-radius:3px;height:3px;}
  .summary-mini-fill{height:100%;border-radius:3px;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;}
  .modal{background:var(--bg2);border:1px solid var(--c5);border-radius:12px;padding:24px;width:440px;max-width:92vw;box-shadow:0 0 40px rgba(56,189,248,.15);}
  .modal-title{font-size:14px;color:var(--muted2);margin-bottom:12px;}
  .modal textarea{width:100%;min-height:100px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:12px;font-size:14px;font-family:var(--font-mono);resize:vertical;outline:none;transition:border-color .15s;}
  .modal textarea:focus{border-color:var(--c5);}
  .modal-footer{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}
  .btn-save{color:var(--c5);border-color:var(--c5);background:rgba(56,189,248,.08);}
  .btn-save:hover{background:rgba(56,189,248,.18);}

  /* LOADING SCREEN */
  .loading-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:13px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px 18px;font-size:12px;color:var(--text);z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideIn .2s ease;}
  @keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* MODO EDICIÓN */
  .btn-edit{color:var(--c3);border-color:var(--c3);background:rgba(245,158,11,.08);}
  .btn-edit:hover{background:rgba(245,158,11,.2);}
  .btn-exit-edit{color:var(--c2);border-color:var(--c2);background:rgba(240,82,82,.08);}
  .btn-exit-edit:hover{background:rgba(240,82,82,.18);}

  .mode-badge{
    display:inline-flex;align-items:center;gap:6px;
    padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700;
    letter-spacing:1.5px;text-transform:uppercase;
  }
  .mode-badge.view{background:rgba(75,90,114,.15);border:1px solid var(--border2);color:var(--muted2);}
  .mode-badge.edit{background:rgba(245,158,11,.12);border:1px solid var(--c3);color:var(--c3);animation:editPulse 2s infinite;}
  @keyframes editPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}50%{box-shadow:0 0 0 4px rgba(245,158,11,.08)}}

  /* readonly: sliders e inputs deshabilitados visualmente */
  body.readonly input[type=range]{pointer-events:none;opacity:.45;cursor:default;}
  body.readonly .status-btn{pointer-events:none;opacity:.5;cursor:default;}
  body.readonly .note-btn{pointer-events:none;opacity:.5;cursor:default;}

  /* MODAL CONTRASEÑA */
  .pwd-modal{background:var(--bg2);border:1px solid var(--c3);border-radius:12px;padding:28px;width:380px;max-width:92vw;box-shadow:0 0 50px rgba(245,158,11,.15);}
  .pwd-modal-title{font-family:var(--font-display);font-size:18px;font-weight:800;color:#F1F5F9;margin-bottom:6px;}
  .pwd-modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
  .pwd-input-wrap{position:relative;}
  .pwd-input{
    width:100%;background:var(--bg);border:1px solid var(--border);
    border-radius:8px;color:var(--text);padding:11px 14px;
    font-size:13px;font-family:var(--font-mono);outline:none;
    transition:border-color .15s;letter-spacing:2px;
  }
  .pwd-input:focus{border-color:var(--c3);}
  .pwd-input.error{border-color:var(--c2);animation:shake .3s ease;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .pwd-error{font-size:12px;color:var(--c2);margin-top:6px;min-height:16px;}
  .pwd-footer{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}

  .footer-note{margin-top:24px;text-align:center;font-size:10px;color:#1E293B;}

  @media(max-width:768px){
    .header,.toolbar,.main{padding-left:14px;padding-right:14px;}
    .header{padding-top:14px;padding-bottom:12px;}
    .header-top{flex-direction:column;gap:12px;}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;}
    .kpi{min-width:unset;padding:10px 12px;}
    .kpi-val{font-size:18px;}
    .project-title{font-size:17px;}
    .toolbar{padding:10px 14px;gap:6px;}
    .btn{padding:8px 12px;font-size:12px;}
    .mode-badge{font-size:11px;padding:5px 10px;}
    .sync-status{margin-left:0;width:100%;justify-content:flex-end;}
    .task-row{flex-direction:column;gap:8px;}
    .status-btn{align-self:flex-start;}
    .task-top{flex-direction:column;gap:4px;}
    .task-dates{flex-wrap:wrap;}
    .slider-row{flex-wrap:wrap;gap:8px;}
    input[type=range]{min-width:100%;}
    .phase-name{font-size:14px;}
    .summary-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));}
    .main{padding:16px 14px;}
    .phase-header{padding:12px 14px;}
    .tasks-wrap{padding:8px 10px 14px;}
    .task-row{padding:10px 12px;}
    .kpi-lbl{font-size:9px;}
  }
  @media(max-width:400px){
    .kpi-val{font-size:16px;}
    .project-title{font-size:15px;}
    .summary-grid{grid-template-columns:1fr 1fr;}
    .btn{padding:7px 10px;font-size:11px;}
  }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loading-screen">
  <div class="loading-spinner"></div>
  <div class="loading-text">Conectando con Firebase...</div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="project-label">Proyecto // Active Directory</div>
      <div class="project-title">🖧 Limpieza y Reestructuración AD/DNS</div>
      <div class="project-dates" id="header-dates">Mar 17/03/26 → Jue 21/05/26</div>
    </div>
    <div class="kpis" id="kpis"></div>
  </div>
  <div>
    <div class="bar-header">
      <span class="bar-label">Progreso Total del Proyecto</span>
      <span class="bar-pct" id="global-pct-lbl">0%</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="global-bar" style="width:0%"></div></div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <span id="mode-badge" class="mode-badge view">👁 Solo vista</span>
  <button class="btn btn-collapse" onclick="toggleAll(false)">Colapsar todo</button>
  <button class="btn btn-collapse" onclick="toggleAll(true)">Expandir todo</button>
  <button class="btn btn-edit" id="btn-edit" onclick="requestEdit()">✏️ Editar</button>
  <button class="btn btn-exit-edit" id="btn-exit" style="display:none" onclick="exitEdit()">🔒 Salir de edición</button>
  <div class="sync-status">
    <div class="sync-dot offline" id="sync-dot"></div>
    <span id="sync-txt">Conectando...</span>
  </div>
</div>

<!-- MODAL CONTRASEÑA -->
<div class="modal-overlay" id="pwd-modal" style="display:none" onclick="closePwdModal()">
  <div class="pwd-modal" onclick="event.stopPropagation()">
    <div class="pwd-modal-title">🔐 Acceso de edición</div>
    <div class="pwd-modal-sub">Ingresa la contraseña para habilitar la edición del tablero.</div>
    <input class="pwd-input" id="pwd-input" type="password" placeholder="Contraseña"
      onkeydown="if(event.key==='Enter')checkPassword()"
      oninput="document.getElementById('pwd-error').textContent=''"/>
    <div class="pwd-error" id="pwd-error"></div>
    <div class="pwd-footer">
      <button class="btn btn-reset" onclick="closePwdModal()">Cancelar</button>
      <button class="btn btn-edit" onclick="checkPassword()">Acceder</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main-content"></div>

<!-- NOTE MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">📝 Nota de seguimiento</div>
    <textarea id="modal-textarea" placeholder="Observaciones, bloqueos, referencias, responsable..."></textarea>
    <div class="modal-footer">
      <button class="btn btn-reset" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-save" onclick="saveNote()">Guardar nota</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->

function defaultProgress() {
  const p = {};
  PHASES.forEach(ph => ph.tasks.forEach(t => {
    p[t.id] = { progress:0, status:"pending", notes:"", updatedAt:"" };
  }));
  return p;
}

function defaultExpanded() {
  const e = {};
  PHASES.forEach((ph,i) => e[ph.id] = i===0);
  return e;
}

// ── FIREBASE SYNC ─────────────────────────────
function setSyncState(state) {
  const dot = document.getElementById("sync-dot");
  const txt = document.getElementById("sync-txt");
  if(!dot||!txt) return;
  dot.className = "sync-dot "+state;
  const msgs = { connected:"Sincronizado · tiempo real", syncing:"Guardando...", offline:"Sin conexión" };
  txt.textContent = msgs[state] || state;
}

// Listen to progress changes from Firebase (real-time)
const progressRef = ref(db, `${ROOT}/progress`);
onValue(progressRef, (snap) => {
  const data = snap.val();
  if(data) {
    // Merge — keep local defaults for any missing task
    const defaults = defaultProgress();
    progress = { ...defaults, ...data };
  } else {
    // First run — initialize in Firebase
    progress = defaultProgress();
    set(ref(db, `${ROOT}/progress`), progress);
  }
  if(!dbReady) {
    // First load
    expanded = defaultExpanded();
    dbReady = true;
    document.getElementById("loading-screen").style.display = "none";
    render();
  } else {
    render();
  }
  setSyncState("connected");
}, (err) => {
  console.error(err);
  setSyncState("offline");
  if(!dbReady) {
    progress = defaultProgress();
    expanded = defaultExpanded();
    dbReady = true;
    document.getElementById("loading-screen").style.display = "none";
    render();
  }
});

// Write a single task update to Firebase
function writeTask(taskId, data) {
  setSyncState("syncing");
  update(ref(db, `${ROOT}/progress/${taskId}`), data)
    .then(()=>setSyncState("connected"))
    .catch(()=>setSyncState("offline"));
}

// ── ACTIONS ──────────────────────────────────
function cycleStatus(taskId) {
  if(!editMode) return;
  const tp = progress[taskId];
  const cur = tp.status || "pending";
  const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(cur)+1) % STATUS_CYCLE.length];
  const newProg = next==="done"?100:next==="in-progress"?Math.max(tp.progress||0,10):0;
  const patch = { status:next, progress:newProg, updatedAt:new Date().toISOString() };
  progress[taskId] = {...tp, ...patch};
  writeTask(taskId, patch);
  render();
}

// Called while dragging (local only)
window._sliderInput = function(taskId, val) {
  if(!editMode) return;
  progress[taskId].progress = val;
  // update just the pct display and bars without full re-render
  const el = document.getElementById("pct-"+taskId);
  if(el) {
    const pctColor = val===100?"#4ADE80":val>0?"#F59E0B":"#4B5A72";
    el.textContent = val+"%";
    el.style.color = pctColor;
  }
  // update phase bars
  const phase = PHASES.find(ph=>ph.tasks.find(t=>t.id===taskId));
  if(phase) {
    const pPct = phaseProgress(phase);
    const pb = document.getElementById("phase-bar-"+phase.id);
    const pp = document.getElementById("phase-pct-"+phase.id);
    if(pb) pb.style.width=pPct+"%";
    if(pp) pp.textContent=pPct+"%";
    const sf = document.getElementById("sc-fill-"+phase.id);
    const sp = document.getElementById("sc-pct-"+phase.id);
    if(sf) sf.style.width=pPct+"%";
    if(sp) sp.textContent=pPct+"%";
  }
  updateGlobalBar();
};

// Called on mouseup/touchend — write to Firebase
window._sliderCommit = function(taskId, val) {
  if(!editMode) return;
  const newStatus = val===100?"done":val>0?"in-progress":"pending";
  const patch = { progress:val, status:newStatus, updatedAt:new Date().toISOString() };
  progress[taskId] = {...progress[taskId], ...patch};
  writeTask(taskId, patch);
};

window.cycleStatus    = cycleStatus;
window.togglePhase    = (id) => { expanded[id]=!expanded[id]; render(); };
window.toggleAll      = (open) => { PHASES.forEach(ph=>expanded[ph.id]=open); render(); };
window.openNote       = (id) => {
  if(!editMode) return;
  editingNote=id;
  document.getElementById("modal-textarea").value=progress[id]?.notes||"";
  document.getElementById("modal").style.display="flex";
  setTimeout(()=>document.getElementById("modal-textarea").focus(),50);
};
window.closeModal = () => { document.getElementById("modal").style.display="none"; editingNote=null; };
window.saveNote = () => {
  if(!editingNote||!editMode) return;
  const txt = document.getElementById("modal-textarea").value.trim();
  const patch = { notes:txt, updatedAt:new Date().toISOString() };
  progress[editingNote] = {...progress[editingNote], ...patch};
  writeTask(editingNote, patch);
  closeModal();
  render();
};

window.requestEdit = () => {
  document.getElementById("pwd-input").value="";
  document.getElementById("pwd-error").textContent="";
  document.getElementById("pwd-modal").style.display="flex";
  setTimeout(()=>document.getElementById("pwd-input").focus(),80);
};
window.closePwdModal = () => {
  document.getElementById("pwd-modal").style.display="none";
};
window.checkPassword = async () => {
  const val = document.getElementById("pwd-input").value;
  const hash = await hashMD5(val);
  if(hash === PWD_HASH) {
    editMode = true;
    closePwdModal();
    document.body.classList.remove("readonly");
    document.getElementById("mode-badge").className="mode-badge edit";
    document.getElementById("mode-badge").textContent="✏️ Modo Edición";
    document.getElementById("btn-edit").style.display="none";
    document.getElementById("btn-exit").style.display="inline-flex";
    showToast("✅ Modo edición habilitado");
  } else {
    const inp = document.getElementById("pwd-input");
    inp.classList.add("error");
    document.getElementById("pwd-error").textContent="Contraseña incorrecta. Inténtalo de nuevo.";
    setTimeout(()=>inp.classList.remove("error"),400);
    inp.value="";
    inp.focus();
  }
};
window.exitEdit = () => {
  editMode = false;
  document.body.classList.add("readonly");
  document.getElementById("mode-badge").className="mode-badge view";
  document.getElementById("mode-badge").textContent="👁 Solo vista";

  showToast("🔒 Modo solo vista activado");
};

document.addEventListener("keydown", e => {

    closePwdModal();

});

// ── HELPERS ───────────────────────────────────
function phaseProgress(phase) {
  const vals = phase.tasks.map(t=>progress[t.id]?.progress||0);
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}
function globalStats() {
  const tasks = PHASES.flatMap(p=>p.tasks);
  const total=tasks.length;
  const done=tasks.filter(t=>progress[t.id]?.status==="done").length;
  const inProg=tasks.filter(t=>progress[t.id]?.status==="in-progress").length;
  const pct=Math.round(tasks.reduce((acc,t)=>acc+(progress[t.id]?.progress||0),0)/total);
  return {total,done,inProg,pct};
}
function updateGlobalBar() {
  const {pct,done,total,inProg}=globalStats();
  const gl=document.getElementById("global-bar");
  const gp=document.getElementById("global-pct-lbl");
  if(gl) gl.style.width=pct+"%";
  if(gp) gp.textContent=pct+"%";
}
function fmtDate(iso) {
  if(!iso) return "";
  try { return new Date(iso).toLocaleDateString("es-MX",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}); }
  catch(e){ return ""; }
}

// ── RENDER ─────────────────────────────────────

  let html="";

    html+=`<div class="phase-card${isOpen?" open":""}" style="--phase-color:${ph.color}">

    if(isOpen){
      html+=`<div class="tasks-wrap">`;
      ph.tasks.forEach(task=>{
        const tp=progress[task.id]||{progress:0,status:"pending",notes:"",updatedAt:""};
        const st=STATUS[tp.status]||STATUS.pending;

        const upd=fmtDate(tp.updatedAt);

        html+=`<div class="task-row${task.isDeliverable?" deliverable":""}" style="--phase-color:${ph.color}">
          <button class="status-btn"
            style="color:${st.color};border-color:${st.color};background:${st.bg}"

          <div class="task-body">
            <div class="task-top">
              <span class="task-name${task.isDeliverable?" deliverable":""}">${task.isDeliverable?"📦 ":""}${task.name}</span>

                <span class="tag">${task.start} → ${task.end}</span>

              <input type="range" min="0" max="100" step="5" value="${tp.progress}"

window.showToast = function(msg) {
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity="0"; t.style.transition="opacity .4s"; setTimeout(()=>t.remove(),400); },2600);
};
</script>
</body>
